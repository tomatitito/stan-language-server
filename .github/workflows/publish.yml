name: Publish to npm
on:
  workflow_run:
    workflows: ["Build and Release Executables"]
    types:
      - completed
jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    permissions:
      contents: read
      id-token: write # For npm provenance and trusted publishing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Node.js (for npm >= 11.5.1)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"
      - name: Update package.json version
        run: |
          bun run version:set ${{ steps.version.outputs.version }}
      - name: Build package
        run: bun run build
      - name: Determine npm tag
        id: npm_tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "Publishing as latest"
          elif [[ "$VERSION" =~ alpha ]]; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
            echo "Publishing as alpha"
          elif [[ "$VERSION" =~ beta ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
            echo "Publishing as beta"
          elif [[ "$VERSION" =~ rc ]]; then
            echo "tag=rc" >> $GITHUB_OUTPUT
            echo "Publishing as release candidate"
          else
            echo "tag=next" >> $GITHUB_OUTPUT
            echo "Publishing as next (pre-release)"
          fi
      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.npm_tag.outputs.tag }} --provenance
      - name: Build stan-language-server-bin package
        run: bun run build:bin-package
      - name: Verify stan-language-server-bin CLI works
        run: node npm/stan-language-server-bin/bin/cli.js --help
      - name: Publish stan-language-server-bin to npm
        working-directory: npm/stan-language-server-bin
        run: npm publish --access public --tag ${{ steps.npm_tag.outputs.tag }} --provenance